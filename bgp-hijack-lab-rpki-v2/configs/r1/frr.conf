frr version 9.1
frr defaults traditional
hostname r1
no ipv6 forwarding
log syslog informational
!
! -------------------------------------------------------
! AS100 - R1 (Observer / Victim-side peer)
! Peers with R2 (AS200, legitimate transit)
! Peers with R4 (AS400, attacker)
! Announces: 11.0.0.0/24
! -------------------------------------------------------
!
interface lo
 ip address 1.1.1.1/32
 ip address 11.0.0.1/24
!
interface eth1
 description link-to-R2-AS200
 ip address 10.12.0.1/30
!
interface eth2
 description link-to-R4-AS400-ATTACKER
 ip address 10.14.0.1/30
!
router bgp 100
 bgp router-id 1.1.1.1
 !
 ! FRR 8+ requires this — without it eBGP sessions
 ! won't exchange routes unless route-maps are explicitly set
 no bgp ebgp-requires-policy
 !
 ! Allow network statements without needing matching IGP route
 no bgp network import-check
 !
 ! Originate AS100's own prefix
 network 11.0.0.0/24
 !
 ! Peer with R2 (legitimate path to AS300 victim prefix)
 neighbor 10.12.0.2 remote-as 200
 neighbor 10.12.0.2 description R2-AS200-transit
 neighbor 10.12.0.2 ebgp-multihop 2
 neighbor 10.12.0.2 timers 5 15
 !
 ! Peer with R4 (attacker — will inject hijacked routes)
 neighbor 10.14.0.2 remote-as 400
 neighbor 10.14.0.2 description R4-AS400-ATTACKER
 neighbor 10.14.0.2 ebgp-multihop 2
 neighbor 10.14.0.2 timers 5 15
 !
 address-family ipv4 unicast
  neighbor 10.12.0.2 activate
  neighbor 10.14.0.2 activate
 exit-address-family
!
! Null route so the network statement is satisfied even
! without 'no bgp network import-check' as a fallback
ip route 11.0.0.0/24 null0
!
line vty
!
