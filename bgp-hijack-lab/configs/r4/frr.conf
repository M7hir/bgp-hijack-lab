frr version 9.1
frr defaults traditional
hostname r4
no ipv6 forwarding
log syslog informational
!
! -------------------------------------------------------
! AS400 - R4 (ATTACKER AS)
! Peers only with R1 (AS100)
! Starts CLEAN — no victim prefix announced at startup
!
! To launch attack, use the scripts:
!   scripts/start_exact_hijack.sh      (announces 13.0.0.0/24)
!   scripts/start_subprefix_hijack.sh  (announces 13.0.0.0/25 — more dangerous)
!   scripts/stop_attack.sh             (withdraws all hijacked routes)
! -------------------------------------------------------
!
interface lo
 ip address 4.4.4.4/32
 ip address 14.0.0.1/24
!
interface eth1
 description link-to-R1-AS100
 ip address 10.14.0.2/30
!
router bgp 400
 bgp router-id 4.4.4.4
 no bgp ebgp-requires-policy
 no bgp network import-check
 !
 ! Attacker announces its own legitimate prefix
 network 14.0.0.0/24
 !
 ! NOTE: No victim prefix (13.0.0.0/24 or /25) here at startup.
 ! Attack scripts inject these dynamically via vtysh.
 !
 neighbor 10.14.0.1 remote-as 100
 neighbor 10.14.0.1 description R1-AS100-target
 neighbor 10.14.0.1 ebgp-multihop 2
 neighbor 10.14.0.1 timers 5 15
 !
 address-family ipv4 unicast
  neighbor 10.14.0.1 activate
 exit-address-family
!
ip route 14.0.0.0/24 null0
!
line vty
!
