server:
    interface: 127.0.0.1
    port: 53
    access-control: 127.0.0.0/8 allow
    do-not-query-localhost: no
    verbosity: 1
    val-permissive-mode: yes
    cache-min-ttl: 0
    cache-max-ttl: 86400
    msg-cache-size: 4m
    rrset-cache-size: 4m

forward-zone:
    name: "."
    forward-addr: 13.0.0.50
